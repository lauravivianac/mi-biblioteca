<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca">


<title>Mi Biblioteca ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0D0A1A;
  --deep: #13102B;
  --dusk: #1E1840;
  --purple: #6C3FC5;
  --violet: #9B6EE8;
  --lilac: #C4A8FF;
  --gold: #F0C060;
  --amber: #D4943A;
  --parchment: #F5EDD8;
  --fog: rgba(196,168,255,0.12);
  --glow: rgba(108,63,197,0.35);
  --text: #EDE8F5;
  --muted: rgba(237,232,245,0.5);
  --border: rgba(196,168,255,0.15);
  --card: rgba(19,16,43,0.85);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--void);
  color: var(--text);
  position: relative;
}

/* ── COSMIC BACKGROUND ── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.bg-canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,63,197,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(30,24,64,0.8) 0%, transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%, #0D0A1A 40%, #13102B 100%);
}
.bg-canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1.5px 1.5px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 15%, rgba(196,168,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 85%, rgba(196,168,255,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 10% 75%, rgba(240,192,96,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 25% 45%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 90%, rgba(196,168,255,0.3) 0%, transparent 100%);
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  animation: float 8s ease-in-out infinite;
  pointer-events: none;
}
.orb-1 { width:300px; height:300px; background:rgba(108,63,197,0.2); top:-80px; left:-80px; animation-delay:0s; }
.orb-2 { width:200px; height:200px; background:rgba(155,110,232,0.15); bottom:20%; right:-60px; animation-delay:3s; }
.orb-3 { width:150px; height:150px; background:rgba(212,148,58,0.12); bottom:10%; left:20%; animation-delay:5s; }
@keyframes float {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}

/* Decorative lines */
.deco-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(90deg, rgba(196,168,255,0.03) 1px, transparent 1px),
    linear-gradient(0deg, rgba(196,168,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── LAYOUT ── */
.app-wrapper {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.app-header {
  padding: env(safe-area-inset-top, 0) 0 0;
  background: rgba(13,10,26,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-inner {
  padding: 14px 18px 0;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.brand { }
.brand-title {
  font-family: 'Cinzel', serif;
  font-size: 19px;
  color: var(--gold);
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 2px;
}
.brand-sub {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header-gems {
  display: flex;
  gap: 14px;
}
.gem {
  text-align: center;
  background: var(--fog);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
}
.gem-num {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  color: var(--gold);
  line-height: 1;
}
.gem-label {
  font-size: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── NAV ── */
.nav-bar {
  display: flex;
  padding: 0 4px;
  gap: 4px;
}
.nav-item {
  flex: 1;
  padding: 10px 4px 8px;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.25s;
  position: relative;
}
.nav-item.active { border-bottom-color: var(--gold); }
.nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }
.nav-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  font-weight: 500;
}
.nav-item.active .nav-label { color: var(--gold); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 80px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── VIEWS ── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── SECTION TITLE ── */
.section-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.section-heading::before, .section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.section-heading-text {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--lilac);
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── YEAR SELECTOR ── */
.year-row {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}
.year-btn {
  flex: 1;
  padding: 10px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--card);
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
  backdrop-filter: blur(10px);
}
.year-btn.active {
  background: linear-gradient(135deg, rgba(108,63,197,0.4), rgba(155,110,232,0.2));
  border-color: var(--violet);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(108,63,197,0.3);
}

/* ── MONTH GROUP ── */
.month-group { margin-bottom: 24px; }
.month-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.month-rune {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: white;
  flex-shrink: 0;
}
.month-name-text {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--lilac);
  letter-spacing: 0.5px;
}
.month-progress {
  margin-left: auto;
  font-size: 10px;
  color: var(--muted);
}

/* ── BOOK CARD (PLAN) ── */
.book-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  backdrop-filter: blur(12px);
  display: flex;
  position: relative;
}
.book-card:active { transform: scale(0.98); }
.book-card.read { opacity: 0.55; }
.book-card.read .book-card-read-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: white;
  z-index: 2;
}
.book-card-cover {
  width: 60px;
  min-height: 85px;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--deep), var(--dusk));
  position: relative;
  overflow: hidden;
}
.book-card-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.cover-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px;
}
.cover-placeholder-icon { font-size: 20px; }
.cover-placeholder-letter {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  color: var(--lilac);
  line-height: 1;
}
.book-card-body {
  flex: 1;
  padding: 12px 12px 10px;
  min-width: 0;
}
.book-card-role {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  margin-bottom: 4px;
}
.role-anchor { color: var(--gold); }
.role-short { color: #7EC8A0; }
.book-card-title {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  line-height: 1.3;
  margin-bottom: 2px;
  color: var(--text);
}
.book-card-author {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
.book-card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--lilac);
  background: rgba(196,168,255,0.08);
}
.tag-pages { color: var(--muted); border-color: transparent; background: transparent; }

/* ── LIBRARY VIEW ── */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px 11px 40px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  backdrop-filter: blur(10px);
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--violet); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}
.filter-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: 14px;
  padding-bottom: 2px;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 10px;
  cursor: pointer;
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.chip.active {
  background: linear-gradient(135deg, rgba(108,63,197,0.5), rgba(155,110,232,0.3));
  border-color: var(--violet);
  color: var(--lilac);
}

/* Lib card */
.lib-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.15s;
  backdrop-filter: blur(12px);
}
.lib-card:active { transform: scale(0.98); }
.lib-cover {
  width: 48px;
  height: 68px;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--deep), var(--dusk));
}
.lib-cover img { width:100%; height:100%; object-fit:cover; }
.lib-cover-ph {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:18px; color:var(--lilac);
}
.lib-info { flex:1; min-width:0; }
.lib-title {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  line-height: 1.3;
  margin-bottom: 2px;
  color: var(--text);
}
.lib-author { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.lib-footer { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.status-read-dot { background: #4CAF50; }
.status-reading-dot { background: var(--violet); }
.status-pending-dot { background: var(--amber); }
.status-text { font-size: 10px; color: var(--muted); }
.lib-year { font-size: 10px; color: rgba(196,168,255,0.3); }

/* ── TRACKER VIEW ── */
.tracker-orb-card {
  background: linear-gradient(135deg, rgba(108,63,197,0.25), rgba(30,24,64,0.8));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 20px;
  text-align: center;
  backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
}
.tracker-orb-card::before {
  content: '✦';
  position: absolute;
  font-size: 80px;
  color: rgba(240,192,96,0.04);
  top: -10px;
  right: -10px;
  line-height: 1;
}
.orb-ring-wrap {
  position: relative;
  width: 110px;
  height: 110px;
  margin: 0 auto 16px;
}
.orb-ring { transform: rotate(-90deg); }
.orb-ring-bg { fill:none; stroke: rgba(196,168,255,0.1); stroke-width: 9; }
.orb-ring-fill {
  fill: none;
  stroke: url(#goldGradient);
  stroke-width: 9;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
}
.orb-center {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.orb-pct { font-family:'Cinzel',serif; font-size:24px; color:var(--gold); line-height:1; }
.orb-sublabel { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.tracker-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
}
.tstat { text-align:center; }
.tstat-num { font-family:'Cinzel',serif; font-size:22px; color:var(--text); line-height:1; }
.tstat-label { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

/* Tracker card */
.tracker-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  backdrop-filter: blur(12px);
}
.tracker-card-header {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  align-items: flex-start;
}
.tracker-card-cover {
  width: 44px;
  height: 60px;
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--deep), var(--dusk));
}
.tracker-card-cover img { width:100%; height:100%; object-fit:cover; }
.tracker-card-cover-ph {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:16px; color:var(--lilac);
}
.tracker-card-info { flex:1; min-width:0; }
.tracker-card-title {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  line-height: 1.3;
  margin-bottom: 2px;
  color: var(--text);
}
.tracker-card-author { font-size: 11px; color: var(--muted); }
.read-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--muted);
}
.read-btn.done {
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  border-color: transparent;
  color: white;
}
.stars-row { display:flex; gap:6px; margin-bottom:10px; }
.star {
  font-size: 22px;
  cursor: pointer;
  color: rgba(240,192,96,0.2);
  transition: color 0.15s, transform 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.star.on { color: var(--gold); text-shadow: 0 0 10px rgba(240,192,96,0.5); }
.star:active { transform: scale(1.3); }
.review-txt {
  width: 100%;
  background: rgba(196,168,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 52px;
  transition: border-color 0.2s;
}
.review-txt::placeholder { color: var(--muted); }
.review-txt:focus { border-color: var(--violet); }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0));
  right: 20px;
  width: 54px; height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--violet));
  color: white;
  font-size: 26px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(108,63,197,0.5), 0 0 0 1px rgba(196,168,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: transform 0.2s;
}
.fab:active { transform: scale(0.92); }

/* ── MODALS ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.sheet {
  background: linear-gradient(180deg, var(--deep) 0%, var(--void) 100%);
  border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  padding: 20px 20px calc(36px + env(safe-area-inset-bottom,0));
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.sheet-title {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

/* Form */
.fg { margin-bottom: 14px; }
.flabel {
  display: block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 500;
}
.finput, .fselect {
  width: 100%;
  padding: 11px 14px;
  background: rgba(196,168,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.finput::placeholder { color: var(--muted); }
.finput:focus, .fselect:focus { border-color: var(--violet); }
.fselect option { background: var(--deep); }
.frow { display: flex; gap: 10px; }
.frow .fg { flex: 1; }

.btn-magic {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--purple), var(--violet));
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 8px;
  box-shadow: 0 4px 20px rgba(108,63,197,0.4);
  transition: opacity 0.2s;
}
.btn-magic:active { opacity: 0.8; }

/* Detail sheet */
.detail-cover-banner {
  width: calc(100% + 40px);
  margin: -20px -20px 0;
  height: 160px;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.detail-cover-banner img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: blur(3px) brightness(0.6);
}
.detail-cover-fg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 16px;
  background: linear-gradient(0deg, rgba(19,16,43,0.9) 0%, transparent 60%);
}
.detail-cover-thumb {
  width: 60px; height: 85px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.detail-cover-thumb img { width:100%; height:100%; object-fit:cover; }
.detail-cover-thumb-ph {
  width:100%; height:100%; background: linear-gradient(135deg, var(--deep), var(--dusk));
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:22px; color:var(--lilac);
}
.detail-cover-banner-ph {
  width:100%; height:100%;
  background: linear-gradient(135deg, var(--deep), var(--dusk), rgba(108,63,197,0.3));
}
.detail-title {
  font-family: 'Cinzel', serif;
  font-size: 19px;
  color: var(--gold);
  line-height: 1.3;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.detail-author { font-family:'EB Garamond',serif; font-size:14px; color:var(--muted); margin-bottom:14px; }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
.detail-tag { font-size:10px; padding:3px 10px; border-radius:20px; border:1px solid var(--border); color:var(--lilac); background:rgba(196,168,255,0.06); }

.status-row { display:flex; gap:8px; margin-bottom:18px; }
.status-btn {
  flex:1; padding:9px 6px;
  border-radius:10px;
  border:1px solid var(--border);
  background: rgba(196,168,255,0.05);
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
  text-align:center;
  transition:all 0.2s;
}
.status-btn.s-read { background:rgba(76,175,80,0.2); border-color:rgba(76,175,80,0.4); color:#81C784; }
.status-btn.s-reading { background:rgba(108,63,197,0.2); border-color:var(--violet); color:var(--lilac); }

.btn-delete {
  width:100%; padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,100,100,0.2);
  background:transparent;
  color:rgba(255,120,120,0.7);
  font-family:'Inter',sans-serif;
  font-size:13px;
  cursor:pointer;
  margin-top:12px;
  transition:all 0.2s;
}

/* Empty */
.empty {
  text-align:center; padding:50px 20px;
  color:var(--muted);
}
.empty-rune { font-size:48px; margin-bottom:12px; opacity:0.5; }
.empty-text { font-family:'EB Garamond',serif; font-size:15px; font-style:italic; }

/* Sparkle animation on load */
@keyframes sparkle {
  0%,100% { opacity:0.3; transform:scale(1); }
  50% { opacity:1; transform:scale(1.2); }
}
.sparkle { animation: sparkle 2s ease-in-out infinite; }
</style>

  <script>
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'biblioteca-v2';
      self.addEventListener('install', e => { self.skipWaiting(); });
      self.addEventListener('activate', e => { self.clients.claim(); });
      self.addEventListener('fetch', e => {
        if (e.request.url.includes('openlibrary') || e.request.url.includes('covers')) {
          e.respondWith(
            fetch(e.request).then(r => {
              const clone = r.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return r;
            }).catch(() => caches.match(e.request))
          );
          return;
        }
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
  </script>

// ─── STORAGE (localStorage for PWA) ───────────────────────────
async function save() {
  try {
    const customBooks = books.filter(b => !b.id.startsWith('seed-'));
    await setDoc(doc(db, 'biblioteca', USER_ID), {
      customBooks: JSON.stringify(customBooks),
      userData: JSON.stringify(userData),
      covers: JSON.stringify(covers),
      updatedAt: Date.now()
    });
    localStorage.setItem('bib_custom', JSON.stringify(customBooks));
    localStorage.setItem('bib_user', JSON.stringify(userData));
    localStorage.setItem('bib_covers', JSON.stringify(covers));
  } catch(e) {
    console.warn('Firebase save failed, fallback localStorage:', e);
    try {
      const customBooks = books.filter(b => !b.id.startsWith('seed-'));
      localStorage.setItem('bib_custom', JSON.stringify(customBooks));
      localStorage.setItem('bib_user', JSON.stringify(userData));
      localStorage.setItem('bib_covers', JSON.stringify(covers));
    } catch(e2) {}
  }
}

async function load() {
  const seedBooks = SEED.map((x,i) => ({...x, id:'seed-'+i}));
  try {
    const snap = await getDoc(doc(db, 'biblioteca', USER_ID));
    if (snap.exists()) {
      const d = snap.data();
      userData = d.userData ? JSON.parse(d.userData) : {};
      covers = d.covers ? JSON.parse(d.covers) : {};
      const customBooks = d.customBooks ? JSON.parse(d.customBooks) : [];
      books = [...seedBooks, ...customBooks];
      localStorage.setItem('bib_user', JSON.stringify(userData));
      localStorage.setItem('bib_covers', JSON.stringify(covers));
      localStorage.setItem('bib_custom', JSON.stringify(customBooks));
      return;
    }
  } catch(e) {
    console.warn('Firebase load failed, fallback localStorage:', e);
  }
  try {
    localStorage.removeItem('bib_books');
    const u = localStorage.getItem('bib_user');
    const c = localStorage.getItem('bib_covers');
    const customRaw = localStorage.getItem('bib_custom');
    userData = u ? JSON.parse(u) : {};
    covers = c ? JSON.parse(c) : {};
    const customBooks = customRaw ? JSON.parse(customRaw) : [];
    books = [...seedBooks, ...customBooks];
  } catch {
    books = seedBooks;
    userData = {}; covers = {};
  }
}

// ─── COVER API ─────────────────────────────────────────────────
async function fetchCover(book) {
  if (covers[book.id]) return covers[book.id];
  const q = encodeURIComponent(`${book.title} ${book.author}`);
  try {
    const r = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i`);
    const d = await r.json();
    const cid = d.docs?.[0]?.cover_i;
    if (cid) {
      const url = `https://covers.openlibrary.org/b/id/${cid}-M.jpg`;
      covers[book.id] = url;
      save();
      return url;
    }
  } catch {}
  covers[book.id] = null;
  save();
  return null;
}

function coverImg(url, letter, cls='') {
  if (url) return `<img src="${url}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'${cls}ph\\'>${letter}</div>'">`;
  return `<div class="${cls}ph">${letter}</div>`;
}

// ─── HELPERS ───────────────────────────────────────────────────
const st = id => userData[id]?.status || 'pending';
const rt = id => userData[id]?.rating || 0;
const rv = id => userData[id]?.review || '';
const fi = t => t.charAt(0).toUpperCase();

function updateStats() {
  const visible = books.filter(b => !userData[b.id]?.hidden);
  const total = visible.length;
  const read = visible.filter(b => st(b.id)==='read').length;
  const reading = visible.filter(b => st(b.id)==='reading').length;
  const pct = total ? Math.round(read/total*100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-read').textContent = read;
  document.getElementById('t-read').textContent = read;
  document.getElementById('t-reading').textContent = reading;
  document.getElementById('t-pending').textContent = total-read-reading;
  document.getElementById('ring-pct').textContent = pct+'%';
  const c = 289.0;
  document.getElementById('ring-fill').style.strokeDashoffset = c - c*pct/100;
}

function nav(view, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  el.classList.add('active');
  if (view==='plan') renderPlan();
  if (view==='biblioteca') renderLib();
  if (view==='tracker') renderTracker();
}

// ─── PLAN ──────────────────────────────────────────────────────
function setYear(y, el) {
  curYear = y;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderPlan();
}

async function renderPlan() {
  const yb = books.filter(b => b.year === curYear && !userData[b.id]?.hidden);
  const byMonth = {};
  MONTH_ORDER.forEach(m => { const mb = yb.filter(b => b.month===m); if(mb.length) byMonth[m]=mb; });

  if (!Object.keys(byMonth).length) {
    document.getElementById('plan-body').innerHTML = `<div class="empty"><div class="empty-rune">📅</div><div class="empty-text">No hay libros para ${curYear}</div></div>`;
    return;
  }

  let html = '';
  for (const [month, mbooks] of Object.entries(byMonth)) {
    const col = MONTH_COLORS[month] || '#888';
    const emoji = MONTH_EMOJIS[month] || '✦';
    const readC = mbooks.filter(b => st(b.id)==='read').length;
    html += `<div class="month-group">
      <div class="month-label">
        <div class="month-rune" style="background:${col}">${emoji}</div>
        <div class="month-name-text">${month}</div>
        <div class="month-progress">${readC}/${mbooks.length}</div>
      </div>`;
    for (const book of mbooks) {
      const isRead = st(book.id)==='read';
      const isAncla = book.role.includes('Ancla');
      const coverUrl = covers[book.id] || null;
      const coverHtml = coverUrl
        ? `<img src="${coverUrl}" alt="" onerror="this.outerHTML='<div class=\\'cover-placeholder\\'><div class=\\'cover-placeholder-icon\\'>${emoji}</div><div class=\\'cover-placeholder-letter\\'>${fi(book.title)}</div></div>'">`
        : `<div class="cover-placeholder"><div class="cover-placeholder-icon">${emoji}</div><div class="cover-placeholder-letter">${fi(book.title)}</div></div>`;
      html += `<div class="book-card ${isRead?'read':''}" style="border-color:rgba(${hexToRgb(col)},0.3)" onclick="openDetail('${book.id}')">
        <div class="book-card-cover">${coverHtml}</div>
        <div class="book-card-body">
          <div class="book-card-role ${isAncla?'role-anchor':'role-short'}">${book.role}</div>
          <div class="book-card-title">${book.title}</div>
          <div class="book-card-author">${book.author}</div>
          <div class="book-card-tags">
            <span class="tag">${book.genre}</span>
            <span class="tag tag-pages">${book.pages} p.</span>
          </div>
        </div>
        ${isRead?'<div class="book-card-read-badge">✓</div>':''}
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('plan-body').innerHTML = html;

  // Lazy load covers
  for (const book of yb) {
    if (!covers[book.id]) {
      fetchCover(book).then(url => {
        if (url) {
          document.querySelectorAll(`[onclick="openDetail('${book.id}')"] .book-card-cover`).forEach(el => {
            el.innerHTML = `<img src="${url}" alt="" onerror="this.style.display='none'">`;
          });
        }
      });
    }
  }
}

// ─── LIBRARY ───────────────────────────────────────────────────
function renderLib() {
  const genres = ['all', ...new Set(books.map(b => b.genre))];
  document.getElementById('genre-chips').innerHTML = genres.map(g =>
    `<div class="chip ${filterGenre===g?'active':''}" onclick="setGenre('${g}')">${g==='all'?'Todos':g}</div>`
  ).join('');

  let filtered = books.filter(b => !userData[b.id]?.hidden);
  if (filterGenre!=='all') filtered = filtered.filter(b => b.genre===filterGenre);
  if (searchQ) { const q=searchQ.toLowerCase(); filtered=filtered.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)); }

  if (!filtered.length) {
    document.getElementById('lib-body').innerHTML = `<div class="empty"><div class="empty-rune">📚</div><div class="empty-text">No se encontraron libros</div></div>`;
    return;
  }

  const statusMap = {read:'Leído',reading:'Leyendo',pending:'Pendiente'};
  const dotMap = {read:'status-read-dot',reading:'status-reading-dot',pending:'status-pending-dot'};
  let html = '';
  filtered.forEach(book => {
    const s = st(book.id);
    const coverUrl = covers[book.id] || null;
    const coverHtml = coverUrl
      ? `<img src="${coverUrl}" alt="" onerror="this.outerHTML='<div class=\\'lib-cover-ph\\'>${fi(book.title)}</div>'">`
      : `<div class="lib-cover-ph">${fi(book.title)}</div>`;
    html += `<div class="lib-card" onclick="openDetail('${book.id}')">
      <div class="lib-cover">${coverHtml}</div>
      <div class="lib-info">
        <div class="lib-title">${book.title}</div>
        <div class="lib-author">${book.author}</div>
        <div class="lib-footer">
          <div class="status-dot ${dotMap[s]}"></div>
          <span class="status-text">${statusMap[s]}</span>
          <span class="tag" style="font-size:9px">${book.genre}</span>
          ${book.year?`<span class="lib-year">${book.year}${book.month?' · '+book.month:''}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('lib-body').innerHTML = html;
}

function setGenre(g) { filterGenre=g; renderLib(); }
function searchLib(q) { searchQ=q; renderLib(); }

// ─── TRACKER ───────────────────────────────────────────────────
function renderTracker() {
  updateStats();
  const visible = books.filter(b => !userData[b.id]?.hidden);
  const ordered = [
    ...visible.filter(b=>st(b.id)==='reading'),
    ...visible.filter(b=>st(b.id)==='pending'),
    ...visible.filter(b=>st(b.id)==='read'),
  ];
  let html = '';
  ordered.forEach(book => {
    const s = st(book.id), r = rt(book.id), rev = rv(book.id);
    const coverUrl = covers[book.id] || null;
    const coverHtml = coverUrl
      ? `<img src="${coverUrl}" alt="" onerror="this.outerHTML='<div class=\\'tracker-card-cover-ph\\'>${fi(book.title)}</div>'">`
      : `<div class="tracker-card-cover-ph">${fi(book.title)}</div>`;
    const stars = [1,2,3,4,5].map(i=>
      `<span class="star ${i<=r?'on':''}" onclick="setRating('${book.id}',${i})">★</span>`
    ).join('');
    html += `<div class="tracker-card">
      <div class="tracker-card-header">
        <div class="tracker-card-cover">${coverHtml}</div>
        <div class="tracker-card-info">
          <div class="tracker-card-title">${book.title}</div>
          <div class="tracker-card-author">${book.author}${book.year?' · '+book.year+(book.month?' '+book.month:''):''}</div>
        </div>
        <button class="read-btn ${s==='read'?'done':''}" onclick="toggleRead('${book.id}')">${s==='read'?'✓':'○'}</button>
      </div>
      <div class="stars-row">${stars}</div>
      <textarea class="review-txt" placeholder="Tu reseña o comentario..." onchange="setReview('${book.id}',this.value)">${rev}</textarea>
    </div>`;
  });
  document.getElementById('tracker-body').innerHTML = html || `<div class="empty"><div class="empty-rune">✨</div><div class="empty-text">Tu progreso aparecerá aquí</div></div>`;
}

async function toggleRead(id) {
  if (!userData[id]) userData[id]={};
  userData[id].status = st(id)==='read' ? 'pending' : 'read';
  save(); updateStats(); renderTracker();
}
async function setRating(id, v) {
  if (!userData[id]) userData[id]={};
  userData[id].rating = v; save(); renderTracker();
}
function setReview(id, v) {
  if (!userData[id]) userData[id]={};
  userData[id].review = v; save();
}

// ─── DETAIL ────────────────────────────────────────────────────
async function openDetail(id) {
  detailId = id;
  const book = books.find(b=>b.id===id);
  if (!book) return;
  const s = st(id), r = rt(id), rev = rv(id);
  const coverUrl = covers[id] || await fetchCover(book);
  const stars = [1,2,3,4,5].map(i=>
    `<span class="star ${i<=r?'on':''}" onclick="detailRating(${i})" style="font-size:26px">★</span>`
  ).join('');

  const bannerHtml = coverUrl
    ? `<img src="${coverUrl}" alt="" onerror="this.style.display='none'">`
    : `<div class="detail-cover-banner-ph"></div>`;
  const thumbHtml = coverUrl
    ? `<img src="${coverUrl}" alt="">`
    : `<div class="detail-cover-thumb-ph">${fi(book.title)}</div>`;

  document.getElementById('detail-sheet').innerHTML = `
    <div class="sheet-handle" style="margin-top:16px"></div>
    <div class="detail-cover-banner">
      ${bannerHtml}
      <div class="detail-cover-fg">
        <div class="detail-cover-thumb">${thumbHtml}</div>
      </div>
    </div>
    <div style="padding:0 20px 0">
      <div class="detail-title">${book.title}</div>
      <div class="detail-author">${book.author}</div>
      <div class="detail-tags">
        <span class="detail-tag">${book.genre}</span>
        <span class="detail-tag">${book.role}</span>
        ${book.year?`<span class="detail-tag">${book.year}${book.month?' · '+book.month:''}</span>`:''}
        <span class="detail-tag">${book.pages} págs.</span>
      </div>
      <div class="section-heading" style="margin-bottom:12px"><span class="section-heading-text">Estado</span></div>
      <div class="status-row">
        <button class="status-btn ${s==='read'?'s-read':''}" onclick="detailStatus('read')">✓ Leído</button>
        <button class="status-btn ${s==='reading'?'s-reading':''}" onclick="detailStatus('reading')">📖 Leyendo</button>
        <button class="status-btn ${s==='pending'?'':''}" onclick="detailStatus('pending')">○ Pendiente</button>
      </div>
      <div class="section-heading" style="margin-bottom:12px"><span class="section-heading-text">Calificación</span></div>
      <div class="stars-row" style="margin-bottom:16px">${stars}</div>
      <div class="section-heading" style="margin-bottom:12px"><span class="section-heading-text">Reseña</span></div>
      <textarea class="review-txt" style="min-height:72px;margin-bottom:16px" placeholder="¿Qué te pareció?" onchange="setReview('${id}',this.value)">${rev}</textarea>
      <button class="btn-delete" onclick="deleteBook('${id}')">🗑 Eliminar de la biblioteca</button>
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target===document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').classList.remove('open');
    updateStats(); renderPlan(); renderLib(); renderTracker();
  }
}

async function detailStatus(s) {
  if (!userData[detailId]) userData[detailId]={};
  userData[detailId].status = s; save(); openDetail(detailId); updateStats();
}
async function detailRating(v) {
  if (!userData[detailId]) userData[detailId]={};
  userData[detailId].rating = v; save(); openDetail(detailId);
}
async function deleteBook(id) {
  if (!confirm('¿Eliminar este libro?')) return;
  if (id.startsWith('seed-')) {
    // Mark seed books as hidden instead of deleting
    if (!userData[id]) userData[id]={};
    userData[id].hidden = true;
  } else {
    books = books.filter(b=>b.id!==id);
  }
  delete covers[id];
  save();
  document.getElementById('detail-overlay').classList.remove('open');
  updateStats(); renderPlan(); renderLib(); renderTracker();
}

// ─── ADD ───────────────────────────────────────────────────────
function openAdd() { document.getElementById('add-overlay').classList.add('open'); }
function closeAdd(e) { if(e.target===document.getElementById('add-overlay')) document.getElementById('add-overlay').classList.remove('open'); }

async function addBook() {
  const title = document.getElementById('f-title').value.trim();
  const author = document.getElementById('f-author').value.trim();
  if (!title||!author) { alert('Título y autor son obligatorios'); return; }
  const book = {
    id: 'b'+Date.now(), title, author,
    genre: document.getElementById('f-genre').value,
    year: parseInt(document.getElementById('f-year').value)||null,
    month: document.getElementById('f-month').value||null,
    pages: document.getElementById('f-pages').value||'—',
    role: document.getElementById('f-role').value,
  };
  books.push(book); save();
  document.getElementById('add-overlay').classList.remove('open');
  ['f-title','f-author','f-pages'].forEach(i=>document.getElementById(i).value='');
  updateStats(); renderPlan(); renderLib();
  // fetch cover in background
  fetchCover(book).then(() => renderPlan());
}

// ─── UTILS ─────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '255,255,255';
}


// ─── EXPOSE TO DOM (required for type=module) ────────────────
window.nav = nav;
window.setYear = setYear;
window.setGenre = setGenre;
window.searchLib = searchLib;
window.openDetail = openDetail;
window.closeDetail = closeDetail;
window.detailStatus = detailStatus;
window.detailRating = detailRating;
window.setReview = setReview;
window.deleteBook = deleteBook;
window.openAdd = openAdd;
window.closeAdd = closeAdd;
window.addBook = addBook;
window.toggleRead = toggleRead;
window.setRating = setRating;

// ─── INIT ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='bib-v2';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{self.clients.claim();});
    self.addEventListener('fetch',e=>{
      if(e.request.url.includes('openlibrary')||e.request.url.includes('covers')){
        e.respondWith(fetch(e.request).then(r=>{const c=r.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c));return r;}).catch(()=>caches.match(e.request)));
        return;
      }
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

await load();

  // Mark pre-read books
  const READ_TITLES = ["Hechizada", "El Gato que Amaba los Libros", "El Laberinto de la Rosa", "La Historia Interminable", "Historia y Nomeolvides", "Manual del Guerrero de la Luz", "La Prueba del Cielo", "Canción de Navidad", "París era una Fiesta"];
  books.forEach(b => {
    if (READ_TITLES.includes(b.title)) {
      if (!userData[b.id]) userData[b.id] = {};
      userData[b.id].status = 'read'; // always force read for these titles
    }
  });
  await save();

updateStats();
renderPlan();
const ls = document.getElementById('loading-screen');
if(ls) ls.style.display='none';
</script>
